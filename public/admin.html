<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ollie · Admin</title>
<style>
  :root{
    --bg:#0a0d14; --bg2:#0e131c; --panel:#141b27; --panel2:#1a2230; --panel3:#212a3a;
    --border:#26324a; --border2:#33425e; --text:#e9eef7; --muted:#8492ad; --muted2:#5d6a85;
    --accent:#6c8cff; --accent2:#4c6ef0; --err:#ff6b6b; --ok:#51cf8e; --warn:#ffa94d;
    --radius:14px; --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.6 'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:1000px;margin:0 auto;padding:40px 20px}

  /* login */
  .login{max-width:380px;margin:80px auto;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
  .login h1{font-size:18px;margin:0 0 6px;font-weight:600}
  .login p{color:var(--muted);margin:0 0 20px;font-size:13px}
  .login input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font:inherit;margin-bottom:12px}
  .login input:focus{outline:none;border-color:var(--accent)}
  .login button{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;border-radius:8px;padding:10px;font:inherit;font-weight:600;cursor:pointer}
  .login button:disabled{opacity:.5;cursor:default}
  .err{color:var(--err);font-size:13px;margin-top:8px;min-height:18px}

  /* panel */
  .head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .head h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-.01em}
  .spacer{flex:1}
  .logout{background:var(--panel2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;font:inherit;font-size:13px;cursor:pointer}
  .logout:hover{color:var(--text);border-color:var(--border2)}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);margin-bottom:6px}
  .stat .v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}

  .toggle{display:flex;gap:4px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:16px;width:fit-content}
  .toggle button{padding:6px 16px;border:none;background:none;color:var(--muted);font:inherit;font-size:13px;font-weight:500;border-radius:7px;cursor:pointer}
  .toggle button.active{background:var(--panel3);color:var(--text)}

  .entry{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px}
  .entry-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .ts{font-family:var(--mono);font-size:12px;color:var(--muted2)}
  .model{font-size:11px;background:var(--panel3);border:1px solid var(--border);border-radius:6px;padding:2px 8px;color:var(--muted)}
  .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .badge.ok{background:rgba(81,207,142,.15);color:var(--ok);border:1px solid rgba(81,207,142,.3)}
  .badge.fail{background:rgba(255,107,107,.15);color:var(--err);border:1px solid rgba(255,107,107,.3)}
  .badge.stream{background:rgba(108,140,255,.15);color:var(--accent);border:1px solid rgba(108,140,255,.3)}

  .turn{margin:6px 0;padding:10px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;white-space:pre-wrap;word-wrap:break-word}
  .turn .who{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);margin-bottom:4px;font-weight:600}
  .turn.user{background:rgba(46,109,82,.08);border-color:rgba(46,109,82,.25)}
  .turn.assistant{background:var(--bg2)}
  .turn.thinking{background:rgba(122,134,163,.06);border-color:rgba(122,134,163,.2);color:var(--muted)}
  .turn.error{color:var(--err)}

  .reqrow{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
  .reqrow:last-child{border-bottom:none}
  .reqrow .code{font-family:var(--mono);color:var(--muted2);font-size:12px}
  .reqrow .st{font-family:var(--mono);font-size:12px;font-weight:600}
  .st.s2{color:var(--ok)} .st.s4{color:var(--err)} .st.s5{color:var(--warn)}
  .empty{color:var(--muted2);text-align:center;padding:40px;font-size:14px}
  a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="wrap" id="panel" style="display:none">
  <div class="head">
    <h1>Admin · Logs</h1>
    <span class="spacer"></span>
    <button class="logout" id="logout">Logout</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="k">Chat turns</div><div class="v" id="stChats">—</div></div>
    <div class="stat"><div class="k">Proxy requests</div><div class="v" id="stReqs">—</div></div>
    <div class="stat"><div class="k">Failed</div><div class="v" id="stFail">—</div></div>
  </div>
  <div class="toggle">
    <button id="tChats" class="active">Chats</button>
    <button id="tReqs">Proxy requests</button>
  </div>
  <div id="list"></div>
</div>

<div class="login" id="login">
  <h1>Admin</h1>
  <p>Enter the admin password to view chat and request logs.</p>
  <form id="lf">
    <input type="password" id="pw" placeholder="Password" autocomplete="off" autofocus>
    <button type="submit" id="lg">Unlock</button>
    <div class="err" id="le"></div>
  </form>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s == null ? '' : String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let token = sessionStorage.getItem('adminToken') || '';
let view = 'chats';
let data = null;

if (token) showPanel();

$('#lf').addEventListener('submit', async e => {
  e.preventDefault();
  const pw = $('#pw').value;
  $('#lg').disabled = true; $('#le').textContent = '';
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const d = await r.json();
    if (r.ok) { token = d.token; sessionStorage.setItem('adminToken', token); showPanel(); }
    else { $('#le').textContent = d.error || 'login failed'; $('#pw').select(); }
  } catch (err) { $('#le').textContent = 'network error'; }
  $('#lg').disabled = false;
});

$('#logout').addEventListener('click', () => {
  sessionStorage.removeItem('adminToken'); token = '';
  $('#panel').style.display = 'none'; $('#login').style.display = 'block'; $('#pw').value = '';
  $('#pw').focus();
});

$('#tChats').addEventListener('click', () => { view = 'chats'; syncToggle(); render(); });
$('#tReqs').addEventListener('click', () => { view = 'reqs'; syncToggle(); render(); });
function syncToggle(){ $('#tChats').classList.toggle('active', view==='chats'); $('#tReqs').classList.toggle('active', view==='reqs'); }

async function showPanel(){
  $('#login').style.display = 'none';
  $('#panel').style.display = 'block';
  await load();
}
async function load(){
  try {
    const r = await fetch('/api/admin/logs', { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.status === 401) { sessionStorage.removeItem('adminToken'); token = ''; $('#panel').style.display='none'; $('#login').style.display='block'; $('#le').textContent='session expired'; return; }
    data = await r.json();
    $('#stChats').textContent = (data.chats || []).length;
    $('#stReqs').textContent = (data.requests || []).length;
    const fails = (data.chats || []).filter(c => !c.ok).length + (data.requests || []).filter(r => r.status >= 400).length;
    $('#stFail').textContent = fails;
    render();
  } catch (e) { $('#list').innerHTML = '<div class="empty">Failed to load logs.</div>'; }
}

function fmtTs(t){ try { return new Date(t).toLocaleString(); } catch { return t; } }

function render(){
  if (!data) return;
  const list = $('#list');
  if (view === 'chats') {
    const c = data.chats || [];
    if (!c.length) { list.innerHTML = '<div class="empty">No chat transcripts yet.</div>'; return; }
    list.innerHTML = c.map(turn => {
      const msgs = (turn.messages || []).map(m => {
        const txt = typeof m.content === 'string' ? m.content : (Array.isArray(m.content) ? m.content.map(b => b.text || b.thinking || '').join('\n') : '');
        return `<div class="turn ${m.role}"><div class="who">${m.role}</div>${esc(txt)}</div>`;
      }).join('');
      const reply = turn.reply
        ? `<div class="turn assistant"><div class="who">assistant</div>${esc(turn.reply)}</div>` : '';
      const think = turn.thinking
        ? `<div class="turn thinking"><div class="who">thinking</div>${esc(turn.thinking)}</div>` : '';
      const err = (!turn.ok && turn.error) ? `<div class="turn error"><div class="who">error</div>${esc(turn.error)}</div>` : '';
      const badge = turn.ok ? '<span class="badge ok">ok</span>' : '<span class="badge fail">fail</span>';
      const sbadge = turn.stream ? '<span class="badge stream">stream</span>' : '';
      return `<div class="entry">
        <div class="entry-head"><span class="ts">${esc(fmtTs(turn.ts))}</span><span class="model">${esc(turn.model)}</span>${badge}${sbadge}</div>
        ${msgs}${think}${reply}${err}
      </div>`;
    }).join('');
  } else {
    const r = data.requests || [];
    if (!r.length) { list.innerHTML = '<div class="empty">No proxy requests logged.</div>'; return; }
    list.innerHTML = '<div class="entry">' + r.map(q => {
      const st = String(q.status || '?');
      const cls = st.startsWith('2') ? 's2' : st.startsWith('4') ? 's4' : st.startsWith('5') ? 's5' : '';
      const usage = q.usage ? `${q.usage.input_tokens||0} in / ${q.usage.output_tokens||0} out` : '';
      return `<div class="reqrow">
        <span class="ts">${esc(fmtTs(q.ts))}</span>
        <span class="model">${esc(q.contract)} · ${esc(q.model||'')}</span>
        <span class="code">${esc(usage)}${q.stream ? ' · stream' : ''}${q.error ? ' · '+esc(q.error).slice(0,60) : ''}</span>
        <span class="st ${cls}">${esc(st)}</span>
      </div>`;
    }).join('') + '</div>';
  }
}
</script>
</body>
</html>
